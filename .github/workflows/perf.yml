name: Performance

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual trigger for after-release re-runs or debugging.
  # `gh workflow run Performance --ref master`
  workflow_dispatch: {}

# On master, share a concurrency group with publish.yml so the two
# workflows serialize instead of racing at the `git push` step. PRs use
# their own per-PR group so they never queue behind each other.
concurrency:
  group: ${{ github.event_name == 'push' && 'master-push' || format('perf-pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: false

jobs:
  perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # depth: 0 so we have history back to the merge base for the PR
          # guard step below (`git diff origin/<base>...HEAD`). Also lets the
          # master commit step push back without shallow-fetch issues.
          fetch-depth: 0
          # Use a token that can push back to master
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── PR guard: reject any PR that touches perf/results.json ────
      # That file is owned exclusively by the master perf workflow. It is
      # in `.gitignore` so local `pnpm perf` runs cannot accidentally stage
      # it, but a contributor could still force-add it with `git add -f`.
      # Catch that here so the perf history stays driven by a single
      # standardized environment.
      - name: Reject PR if perf/results.json was modified
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 --quiet
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -q '^perf/results\.json$'; then
            echo ""
            echo "::error file=perf/results.json::perf/results.json was modified in this PR. Only the master perf workflow may write this file."
            echo ""
            echo "------------------------------------------------------------"
            echo "  perf/results.json must not be committed from a PR."
            echo ""
            echo "  This file is regenerated by the perf workflow on every"
            echo "  push to master, so the numbers always come from the same"
            echo "  CI environment. Local 'pnpm perf' runs are gitignored to"
            echo "  prevent this — your version was likely force-added with"
            echo "  'git add -f'."
            echo ""
            echo "  To unblock this PR, drop your changes to the file:"
            echo ""
            echo "      git checkout origin/${{ github.base_ref }} -- perf/results.json"
            echo "      git rm --cached perf/results.json   # if it's still staged"
            echo "      git commit --amend --no-edit"
            echo "      git push --force-with-lease"
            echo "------------------------------------------------------------"
            exit 1
          fi
          echo "OK: perf/results.json is unchanged"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          # Pinned exact version — V8 changes between Node versions affect
          # regex-engine limits directly. Bump deliberately, not by drift.
          node-version: 22.11.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Save the master version of results.json BEFORE running perf, so we
      # can diff against it in the PR comment step.
      - name: Capture baseline (PR only)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p /tmp/perf-baseline
          if [ -f perf/results.json ]; then
            cp perf/results.json /tmp/perf-baseline/before.json
          fi

      - name: Run performance suite
        run: pnpm perf

      # ── master: commit the updated results back ──────────────────
      # `perf/results.json` is gitignored so local `pnpm perf` runs never
      # leak into commits. CI is the single source of truth and bypasses
      # the ignore with `git add -f`.
      #
      # A merge to master can trigger BOTH publish.yml and this workflow in
      # parallel. Publish pushes a `chore: release` commit; by the time we
      # try to push, master may be ahead of our checkout. Rebase-and-retry
      # up to 3 times before giving up.
      - name: Commit updated results to master
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f perf/results.json
          if git diff --staged --quiet; then
            echo "No perf changes to commit"
            exit 0
          fi
          # [skip ci] prevents the auto-commit from triggering this same workflow
          git commit -m "perf: update results [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:master; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing onto latest master and retrying"
            git fetch origin master
            # Our only change is perf/results.json; rebase should never conflict
            # because no other workflow writes to this file.
            git rebase origin/master
          done
          echo "::error::Push still rejected after 3 rebase attempts"
          exit 1

      # ── PR: post / update a comment with before-vs-after ─────────
      - name: Generate PR comparison comment
        if: github.event_name == 'pull_request'
        run: |
          BEFORE=""
          if [ -f /tmp/perf-baseline/before.json ]; then
            BEFORE=/tmp/perf-baseline/before.json
          fi
          pnpm exec tsx perf/compare.ts "$BEFORE" perf/results.json > /tmp/perf-comment.md
          cat /tmp/perf-comment.md

      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          # Same key on every run → updates the existing comment instead of
          # spamming. The header text identifies it for humans.
          header: perf-impact
          path: /tmp/perf-comment.md
