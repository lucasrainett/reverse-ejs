version: 2
updates:
  # npm dev-dependency updates. The library has no runtime dependencies,
  # so this only touches devDependencies (test / build / lint tooling).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      dev-dependencies:
        dependency-type: "development"

  # Keep pinned GitHub Action versions fresh. Less frequent because
  # actions change less often and bumping them touches CI behavior.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
